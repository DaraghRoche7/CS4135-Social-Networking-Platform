server:
  port: 8082

spring:
  application:
    name: support-service
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/studyhub}
    username: ${DB_USER:studyhub}
    password: ${DB_PASSWORD:studyhub}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.hibernate.SQL: warn

app:
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  cache:
    feedTtlSeconds: 60
  seed:
    # Creates a background user via the gateway and inserts posts from test-assets/ (idempotent).
    # If the gateway/user-service isn't up yet, seeding is skipped with a warning.
    enabled: ${APP_SEED_ENABLED:true}
    gatewayBaseUrl: ${APP_SEED_GATEWAY_BASE_URL:http://localhost:8080}
    testAssetsDir: ${APP_SEED_TEST_ASSETS_DIR:../../test-assets}
    moduleCode: ${APP_SEED_MODULE_CODE:CS4135}
    email: ${APP_SEED_EMAIL:seedbot@studentmail.ul.ie}
    password: ${APP_SEED_PASSWORD:StudyHub!2026}
    name: ${APP_SEED_NAME:Seed Bot}

