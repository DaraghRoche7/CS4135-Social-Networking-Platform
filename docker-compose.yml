services:
  postgres:
    image: postgres:16
    container_name: studyhub-postgres
    environment:
      POSTGRES_DB: studyhub
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: studyhub
    ports:
      - "5432:5432"
    volumes:
      - studyhub_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: studyhub-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: studyhub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  studyhub_pgdata:

