version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "team"
    # Labels will be added after running setup-labels script
    # labels:
    #   - "dependencies"
    #   - "automated"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    reviewers:
      - "team"
    # Labels will be added after running setup-labels script
    # labels:
    #   - "dependencies"
    #   - "github-actions"
    #   - "automated"



