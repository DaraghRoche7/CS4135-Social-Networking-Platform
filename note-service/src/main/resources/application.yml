server:
  port: 8082

spring:
  application:
    name: note-service
  datasource:
    url: jdbc:postgresql://localhost:5432/studyhub_notes
    username: studyhub
    password: studyhub
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: studyhub-secret-key-for-jwt-authentication-2024
  expiration: 86400000

file:
  upload-dir: ./uploads/notes

resilience4j:
  circuitbreaker:
    instances:
      noteEventPublisher:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      noteEventPublisher:
        maxAttempts: 3
        waitDuration: 1000
  timelimiter:
    instances:
      noteEventPublisher:
        timeoutDuration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
