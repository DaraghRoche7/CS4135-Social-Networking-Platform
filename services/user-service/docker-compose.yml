services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: studyhub_users
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: studyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: