services:
  postgres:
    image: postgres:16-alpine
    container_name: studyhub-postgres
    environment:
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: studyhub
      POSTGRES_DB: studyhub_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: studyhub-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management
    container_name: studyhub-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build:
      context: ./services/user-service
    environment:
      SERVER_PORT: 8083
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: studyhub_users
      DB_USER: studyhub
      DB_PASS: studyhub
      JWT_SECRET: change-me-local-dev-secret-change-me
      JWT_EXPIRATION_MS: 86400000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8083:8083"

  core-service:
    build:
      context: ./backend/core-service
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/studyhub_core
      DB_USERNAME: studyhub
      DB_PASSWORD: studyhub
      APP_JWT_SECRET: change-me-local-dev-secret-change-me
      APP_INTERNAL_API_KEY: change-me-internal-api-key
      APP_MESSAGING_ENABLED: "true"
      APP_POSTS_DIR: /var/lib/studyhub/posts
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "8081:8081"
    volumes:
      - studyhub-posts:/var/lib/studyhub/posts

  support-service:
    build:
      context: ./backend/support-service
    environment:
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/studyhub_support
      DB_USERNAME: studyhub
      DB_PASSWORD: studyhub
      CORE_SERVICE_URL: http://core-service:8081
      APP_JWT_SECRET: change-me-local-dev-secret-change-me
      APP_INTERNAL_API_KEY: change-me-internal-api-key
      APP_MESSAGING_ENABLED: "true"
      APP_ALLOW_DEMO_TOKEN: "false"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      - postgres
      - rabbitmq
      - core-service
    ports:
      - "8082:8082"

  api-gateway:
    build:
      context: ./backend/api-gateway
    environment:
      SERVER_PORT: 8080
      CORE_SERVICE_URL: http://core-service:8081
      SUPPORT_SERVICE_URL: http://support-service:8082
      USER_SERVICE_URL: http://user-service:8083
    depends_on:
      - user-service
      - core-service
      - support-service
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  studyhub-posts:
