server:
  port: 8082

spring:
  application:
    name: note-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    url: jdbc:h2:mem:studyhub_notes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  config:
    import: ""
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    enabled: false

jwt:
  secret: studyhub-secret-key-for-jwt-authentication-2024
  expiration: 86400000

file:
  upload-dir: ./uploads/notes

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.studyhub: DEBUG
