server:
  port: 8082

spring:
  application:
    name: support-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/studyhub}
    username: ${DB_USER:studyhub}
    password: ${DB_PASSWORD:studyhub}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

logging:
  level:
    org.hibernate.SQL: warn

app:
  cache:
    feedTtlSeconds: 60

