server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: core-service-auth
            uri: ${CORE_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/auth/**
          - id: core-service-social
            uri: ${CORE_SERVICE_URL:http://localhost:8081}
            predicates:
              - Path=/api/feed/**,/api/posts/**,/api/users/**
          - id: support-service-notifications
            uri: ${SUPPORT_SERVICE_URL:http://localhost:8082}
            predicates:
              - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
