spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${FRONTEND_ORIGIN:http://localhost:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: user-service-auth
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/users/**

        - id: note-service
          uri: ${NOTE_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/notes/**

        - id: interaction-service
          uri: ${INTERACTION_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/interactions/**

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.studyhub: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.studyhub: INFO